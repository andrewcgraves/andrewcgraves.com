name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      - name: Dead code check
        run: yarn knip

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Write coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const pct = (v) => v.pct.toFixed(1) + '%';
              const row = (label, v) =>
                '| ' + label + ' | ' + pct(v) + ' | ' + v.covered + ' / ' + v.total + ' |';
              const md = [
                '## Test Coverage',
                '',
                '| Metric | Coverage | Count |',
                '|--------|----------|-------|',
                row('Lines', s.lines),
                row('Functions', s.functions),
                row('Branches', s.branches),
                row('Statements', s.statements),
              ].join('\n');
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
            "
          fi

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
